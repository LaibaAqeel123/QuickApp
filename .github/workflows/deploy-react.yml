# Deploy React admin portal when pushing to main (monorepo).
# GitHub only runs workflows from repo root – frontend/.github/workflows/ is not triggered from here.

name: Deploy React App

on:
  push:
    branches: [main, master]

jobs:
  build-and-deploy-react:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve React app path
        id: app
        run: |
          for dir in frontend/QuickApp/Frontend/admin-portal frontend/admin-portal frontend; do
            if [ -f "$dir/package.json" ]; then
              echo "app_dir=$dir" >> $GITHUB_OUTPUT
              # Strip path so dist/ contents (index.html, assets/) land at target root only
              segs=$(echo "$dir/dist" | tr '/' '\n' | wc -l)
              echo "strip_components=$segs" >> $GITHUB_OUTPUT
              echo "Found at $dir (strip_components=$segs)"
              exit 0
            fi
          done
          echo "No React app (package.json) found under frontend/" && exit 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: |
          cd ${{ steps.app.outputs.app_dir }}
          npm ci --no-audit --no-fund || npm install --no-audit --no-fund

      - name: Build React app
        run: |
          cd ${{ steps.app.outputs.app_dir }}
          npm run build

      - name: Verify build output
        run: |
          APP_DIR="${{ steps.app.outputs.app_dir }}"
          if [ -d "$APP_DIR/dist" ]; then
            echo "Build output (dist):"
            ls -la "$APP_DIR/dist/"
          else
            echo "ERROR: dist/ not found (Vite default). Check build script."
            exit 1
          fi

      # Deploy dist contents to admin site root only (no nested app.nepta folders)
      - name: Deploy React app to Windows Server (admin)
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: 22
          source: "${{ steps.app.outputs.app_dir }}/dist"
          target: "/c/inetpub/wwwroot/admin"
          strip_components: ${{ steps.app.outputs.strip_components }}
          tar_dereference: true
          overwrite: true

      - name: Restart IIS site (admin)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: 22
          script_stderr: true
          script: |
            powershell.exe -Command "Import-Module WebAdministration; Stop-WebSite -Name 'admin'; Start-Sleep -Seconds 3; Start-WebSite -Name 'admin'"
