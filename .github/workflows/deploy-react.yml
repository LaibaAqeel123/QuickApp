# Deploy React admin portal when pushing to main (monorepo).
# GitHub only runs workflows from repo root – frontend/.github/workflows/ is not triggered from here.
# Deploys dist contents to C:\inetpub\wwwroot\app.neptasolutions.co.uk so IIS serves index.html at site root.

name: Deploy React App

on:
  push:
    branches: [main, master]

jobs:
  build-and-deploy-react:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Resolve React app path
        id: app
        run: |
          for dir in frontend/QuickApp/Frontend/admin-portal frontend/admin-portal frontend; do
            if [ -f "$dir/package.json" ]; then
              echo "app_dir=$dir" >> $GITHUB_OUTPUT
              echo "Found at $dir"
              exit 0
            fi
          done
          echo "No React app (package.json) found under frontend/" && exit 1

      - name: Create production env file
        run: |
          APP_DIR="${{ steps.app.outputs.app_dir }}"
          echo "VITE_API_URL=https://api.neptasolutions.co.uk/api/v1" > "$APP_DIR/.env.production"
          echo "VITE_APP_NAME=QuickApp Admin" >> "$APP_DIR/.env.production"
          echo "Created .env.production:"
          cat "$APP_DIR/.env.production"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: |
          cd ${{ steps.app.outputs.app_dir }}
          npm ci --no-audit --no-fund || npm install --no-audit --no-fund

      - name: Build React app
        run: |
          cd ${{ steps.app.outputs.app_dir }}
          npm run build

      - name: Verify build output
        run: |
          APP_DIR="${{ steps.app.outputs.app_dir }}"
          if [ -d "$APP_DIR/dist" ]; then
            echo "Build output (dist):"
            ls -la "$APP_DIR/dist/"
          else
            echo "ERROR: dist/ not found (Vite default). Check build script."
            exit 1
          fi

      # Copy dist contents to a single folder so deploy puts index.html at site root (no nested folders)
      - name: Prepare deploy artifact (dist contents only)
        run: |
          APP_DIR="${{ steps.app.outputs.app_dir }}"
          mkdir -p react-deploy
          cp -r "$APP_DIR/dist/"* react-deploy/
          echo "Deploy artifact contents:"
          ls -la react-deploy/

      - name: Deploy React app to IIS (app.neptasolutions.co.uk)
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: 22
          source: "react-deploy"
          target: "/c/inetpub/wwwroot/app.neptasolutions.co.uk"
          strip_components: 1
          tar_dereference: true
          overwrite: true

      - name: Restart IIS site (app.neptasolutions.co.uk)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: 22
          script_stderr: true
          script: |
            powershell.exe -Command "Import-Module WebAdministration; $siteName = '${{ secrets.IIS_SITE_NAME }}'; if ([string]::IsNullOrEmpty($siteName)) { $siteName = 'app.neptasolutions.co.uk' }; Stop-WebSite -Name $siteName -ErrorAction SilentlyContinue; Start-Sleep -Seconds 2; Start-WebSite -Name $siteName -ErrorAction SilentlyContinue"
