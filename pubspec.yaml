name: food_delivery_app
description: A food delivery and ordering platform
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  provider: ^6.1.1
  google_fonts: ^8.0.2
  flutter_svg: ^2.0.9
  http: ^1.6.0
  shared_preferences: ^2.3.2
  image_picker: ^1.1.2
  http_parser: ^4.1.2
  signalr_netcore: ^1.3.6
  geolocator: ^12.0.0
  flutter_map: ^6.1.0
  latlong2: ^0.9.0
  firebase_core: ^3.0.0
  firebase_messaging: ^15.0.0
  flutter_local_notifications: ^17.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true